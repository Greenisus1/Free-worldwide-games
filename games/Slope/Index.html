<!DOCTYPE html>
<html>
<head>
    <title>Slope</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        iframe {
            width: 60vw;
            height: 60vh;
            border: none;
            border-radius: 10px;
        }
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .back-button img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 8px;
        }
        .back-button img:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <a href="https://greenisus1.github.io/Free-worldwide-games/Index.html" class="back-button">
        <img src="https://greenisus1.github.io/Free-worldwide-games/Images/IMG_9342.png" alt="Back">
    </a>
    <iframe src="https://gothbr4dn.github.io/Slope-Source-code/"></iframe>
</body>
</html>
