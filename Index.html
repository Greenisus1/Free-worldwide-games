<!DOCTYPE html>
<html>
<head>
    <title>Free Worldwide Games</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: white;
        }

        header {
            background: #111;
            padding: 25px;
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 2px solid #00ff88;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .game-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: scale(1.06);
            border-color: #00ff88;
            background: #222;
        }

        .game-card img {
            width: 30%;
            border-radius: 10px;
        }

        .game-title {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>Free Worldwide Games</header>

<div class="grid">

    <a href="https://greenisus1.github.io/Free-worldwide-games/games/Slope/Index.html" class="game-card">
        <img src="https://greenisus1.github.io/Free-worldwide-games/Images/IMG_9340.png" alt="Slope">
        <div class="game-title">Slope</div>
    </a>

</div>

</body>
</html>
